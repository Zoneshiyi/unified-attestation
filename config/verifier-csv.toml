listen = "127.0.0.1:8080"

[wasm]
allow_unsigned = false
registry_dir = "data/components"
trusted_component_hashes = [
  # csv_appraiser.wasm
  "e4062a2e6cb7063c802e07e9e5eeb70e55b313f0c6251c1246ad42524499e7e3",
]

[ear]
signing_key_path = "config/keys/ear_signing.pem"

# Hygon CSV：host 端做 csv-rs 链验签 + chip_id 白名单。
# enabled=false 时整体跳过验签（仅 demo / 联调，生产必须 true）。
[policy.csv]
enabled = true
# HSK/CEK 离线缓存目录；evidence 不携带 hsk_cek 时按 <cert_dir>/hsk_cek/<chip_id>/hsk_cek.cert 找。
# 为空则用默认 /opt/hygon/csv。
# cert_dir = "/opt/hygon/csv"
# 离线缓存未命中时是否走 KDS 在线拉取（https://cert.hygon.cn/hsk_cek?snumber=<chip>）。
allow_kds_fetch = false
# chip_id 白名单（serial_number 文本）。空 → 不做 chip 白名单。
trusted_chip_ids = []
